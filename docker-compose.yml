services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: deihealth
      MYSQL_USER: favian
      MYSQL_PASSWORD: "123"
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build: .
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      APP_NAME: DeiHealth
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: http://localhost:8000
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: deihealth
      DB_USERNAME: favian
      DB_PASSWORD: "123"
      ADMIN_NAME: Admin DeiHealth
      ADMIN_EMAIL: admin@deihealth.local
      ADMIN_PASSWORD: password123
      CACHE_STORE: file
      QUEUE_CONNECTION: database
      SESSION_DRIVER: file
    ports:
      - "8000:8000"

volumes:
  mysql-data:
